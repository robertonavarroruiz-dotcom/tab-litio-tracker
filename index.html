<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAB Spain · Tracker Litio HV</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tab:#00579C;--tab2:#003B7A;--tab-l:#E8F0FB;
  --bg:#F4F6FA;--bg3:#EEF1F6;
  --red:#ED1C24;--ok:#1a7a45;--warn:#B45309;--info:#1D4ED8;
  --text:#1A202C;--text2:#4A5568;--text3:#718096;
  --border:#DDE3EC;--border2:#C5CEDC;
  --font:'Segoe UI',system-ui,sans-serif;
  --sh:0 1px 3px rgba(0,0,0,0.07);--sh2:0 6px 24px rgba(0,0,0,0.13);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
.topbar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:62px;box-shadow:var(--sh);position:sticky;top:0;z-index:50}
.vd{width:1px;height:32px;background:var(--border2)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.ntab{padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent;transition:all .12s;display:flex;align-items:center;gap:5px}
.ntab:hover{background:var(--bg3)}
.ntab.active{color:var(--tab);background:var(--tab-l);border-color:#BDD0EC}
.upill{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);padding:5px 13px;border-radius:20px;cursor:pointer;margin-left:auto;white-space:nowrap;font-size:12px;font-weight:600;color:var(--text2)}
.udot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0}
.main{padding:22px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:85vh}
.login-box{background:#fff;border:1px solid var(--border);border-radius:14px;padding:40px;width:380px;box-shadow:var(--sh2);text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;transition:all .12s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--tab);color:#fff;padding:10px 20px;font-size:13px}
.btn-p:hover{background:var(--tab2)}
.btn-g{background:transparent;color:var(--text2);border:2px solid var(--border2);padding:7px 14px;font-size:12px}
.btn-g:hover{background:var(--bg3)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;padding:11px}
.btn-ok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;padding:6px 12px;font-size:12px}
.btn-danger{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;padding:6px 12px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--sh)}
.sv{font-size:22px;font-weight:800}.sl{font-size:11px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.c-tab{color:var(--tab)}.c-ok{color:var(--ok)}.c-w{color:var(--warn)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:#fff;border:2px solid var(--border2);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--tab)}
.toolbar input{min-width:200px}
.tw{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.th{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:grid;gap:8px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.tr{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;gap:8px;align-items:center;cursor:pointer;transition:background .1s}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--tab-l)}
.c7{grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 64px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bd{background:#EDE9FE;color:#5B21B6;border:1px solid #C4B5FD}
.br{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.be{background:#DBEAFE;color:#1D4ED8;border:1px solid #93C5FD}
.bg{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.bl{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5}
.bh{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;font-size:10px;padding:2px 6px}
.chip{display:inline-flex;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.panel-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;justify-content:flex-end}
.panel{background:#fff;width:580px;max-width:96vw;height:100vh;overflow-y:auto;border-left:1px solid var(--border);padding:26px;display:flex;flex-direction:column;gap:16px;box-shadow:-4px 0 20px rgba(0,0,0,0.09)}
.panel-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.ps{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.pst{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kv{display:flex;flex-direction:column;gap:2px}
.kl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.kv-v{font-size:13px;font-weight:600;color:var(--text)}
.biga{font-size:20px;font-weight:800;color:var(--tab)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:700px;max-width:100%;box-shadow:var(--sh2);margin:auto}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;color:var(--text);display:flex;align-items:center;gap:7px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.ff label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{background:var(--bg);border:2px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--tab);background:#fff;box-shadow:0 0 0 3px rgba(0,87,156,0.07)}
.ff textarea{resize:vertical;min-height:70px;line-height:1.5}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.file-drop{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.file-drop:hover,.file-drop.over{border-color:var(--tab);background:var(--tab-l)}
.file-drop i{font-size:30px;color:var(--text3);display:block;margin-bottom:8px}
.file-drop p{font-size:12px;color:var(--text3)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:7px;padding:8px 12px}
.fname{flex:1;font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-size:11px;color:var(--text3);white-space:nowrap}
.fdel{cursor:pointer;color:var(--red);font-size:14px;flex-shrink:0}
.tl-item{display:flex;gap:10px}
.tl-w{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-ln{width:1px;background:var(--border2);flex:1;min-height:16px}
.tl-c{padding-bottom:12px;flex:1}
.tl-date{font-size:11px;color:var(--text3);font-weight:500}
.tl-txt{font-size:12px;color:var(--text2);margin-top:1px}
.comp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.cbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;flex:1}
.cbar-f{height:100%;border-radius:2px}
.doc-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.doc-item:last-child{border-bottom:none}
.doc-name{flex:1;font-size:12px;font-weight:600;color:var(--tab);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-size{font-size:11px;color:var(--text3);white-space:nowrap}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.sec-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.exp-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.exp-row:last-child{border-bottom:none}
.exp-row span{color:var(--text2);flex:1;font-weight:500}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.info-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:18px;margin-bottom:16px}
.info-box-title{font-size:13px;font-weight:700;color:#1D4ED8;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-box ol{margin-left:20px;color:var(--text2);font-size:12px;line-height:2}
.info-box code{background:#DBEAFE;color:#1D4ED8;padding:2px 7px;border-radius:4px;font-family:monospace;font-size:12px}
.info-box.green{background:#F0FDF4;border-color:#BBF7D0}
.info-box.green .info-box-title{color:#166534}
</style>
</head>

function can(p){return S.user&&ROLES[S.user].perms.includes(p)}
function fmt(n){if(!n&&n!==0)return'—';return'€'+Number(n).toLocaleString('es-ES')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function badge(e){const m={'Detectada':'bd','Revisión PM':'br','Enviada cliente':'be','Ganada':'bg','Perdida':'bl'};return'<span class="badge '+( m[e]||'')+'">' +esc(e)+'</span>'}
function fileIcon(n){const e=(n||'').split('.').pop().toLowerCase();return{pdf:'ti-file-type-pdf',doc:'ti-file-type-doc',docx:'ti-file-type-doc',xls:'ti-file-type-xls',xlsx:'ti-file-type-xls',png:'ti-photo',jpg:'ti-photo',jpeg:'ti-photo'}[e]||'ti-file'}
function fmtSz(b){if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return(b/1048576).toFixed(1)+' MB'}
function push(o,txt){o.timeline.push({fecha:new Date().toISOString().slice(0,10),txt})}

function render(){
  if(!S.user){renderLogin();return;}
  renderNav();
  document.getElementById('user-label').textContent=ROLES[S.user].label;
  const m=document.getElementById('main');
  if(S.tab==='opps')renderOpps(m);
  else if(S.tab==='dash')renderDash(m);
  else if(S.tab==='export')renderExport(m);
  else if(S.tab==='acceso')renderAcceso(m);
}

function renderLogin(){
  document.getElementById('nav-tabs').innerHTML='';
  document.getElementById('modal-root').innerHTML='';
  document.getElementById('main').innerHTML='<div class="login-wrap"><div class="login-box">'
    +'<img src="'+LOGIN_LOGO+'" alt="TAB Spain" style="height:70px;width:auto;margin-bottom:16px">'
    +'<div style="font-size:12px;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:26px">División Litio · High Voltage</div>'
    +'<div style="text-align:left;margin-bottom:14px">'
    +'<label style="display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Acceder como</label>'
    +'<select id="lr" style="width:100%;background:var(--bg3);border:2px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none">'
    +'<option value="">— Seleccionar perfil —</option>'
    +'<option value="detector">Roberto · Detector de oportunidades</option>'
    +'<option value="pm">PM Litio · Product Manager</option>'
    +'<option value="hv">HV · Responsable High Voltage</option>'
    +'</select></div>'
    +'<button class="btn btn-p btn-full" onclick="doLogin()"><i class="ti ti-login"></i> Entrar</button>'
    +'</div></div>';
}
function doLogin(){const v=document.getElementById('lr').value;if(!v)return;S.user=v;S.tab='opps';render()}
function logout(){S.user=null;document.getElementById('modal-root').innerHTML='';render()}

function renderNav(){
  const tabs=[
    {id:'opps',label:'Oportunidades',icon:'ti-briefcase'},
    {id:'dash',label:'Dashboard',icon:'ti-chart-bar'},
    {id:'export',label:'Exportar',icon:'ti-download'},
    {id:'acceso',label:'Acceso GitHub',icon:'ti-brand-github'},
  ];
  document.getElementById('nav-tabs').innerHTML=tabs.map(t=>'<div class="ntab '+(S.tab===t.id?'active':'')+'" onclick="setTab(\''+t.id+'\')"><i class="ti '+t.icon+'"></i> '+t.label+'</div>').join('');
}
function setTab(t){S.tab=t;closeSP();render()}

function renderOpps(main){
  const {q,estado,cliente}=S.filter;
  let opps=S.opps.filter(o=>{
    if(S.user==='hv'&&false)return false; // HV ve todo
    if(q&&!o.nombre.toLowerCase().includes(q.toLowerCase())&&!o.expediente.toLowerCase().includes(q.toLowerCase()))return false;
    if(estado&&o.estado!==estado)return false;
    if(cliente&&o.cliente!==cliente)return false;
    return true;
  });
  const cnt={};ESTADOS.forEach(e=>cnt[e]=S.opps.filter(o=>o.estado===e).length);
  const tot=S.opps.reduce((a,b)=>a+(b.importe||0),0);
  main.innerHTML='<div class="stats">'
    +'<div class="stat"><div class="sv c-tab">'+S.opps.length+'</div><div class="sl">Expedientes</div></div>'
    +'<div class="stat"><div class="sv c-w">'+(cnt['Revisión PM']||0)+'</div><div class="sl">En revisión PM</div></div>'
    +'<div class="stat"><div class="sv" style="color:var(--info)">'+(cnt['Enviada cliente']||0)+'</div><div class="sl">Enviadas</div></div>'
    +'<div class="stat"><div class="sv c-ok">'+(cnt['Ganada']||0)+'</div><div class="sl">Ganadas</div></div>'
    +'<div class="stat"><div class="sv" style="font-size:15px">'+fmt(tot)+'</div><div class="sl">Presupuestado</div></div>'
    +'</div>'
    +'<div class="toolbar">'
    +'<input placeholder="Buscar expediente…" value="'+esc(q)+'" oninput="S.filter.q=this.value;render()">'
    +'<select onchange="S.filter.estado=this.value;render()"><option value="">Todos los estados</option>'+ESTADOS.map(e=>'<option value="'+e+'" '+(estado===e?'selected':'')+'>'+e+'</option>').join('')+'</select>'
    +((S.user==='detector'||S.user==='pm'||S.user==='hv')?'<select onchange="S.filter.cliente=this.value;render()"><option value="">Todos los clientes</option>'+CLIENTES.map(c=>'<option '+(cliente===c?'selected':'')+'>'+c+'</option>').join('')+'</select>':'')
    +'<div style="margin-left:auto">'+(can('add')?'<button class="btn btn-p btn-sm" onclick="openNewModal()"><i class="ti ti-plus"></i> Nueva oportunidad</button>':'')+'</div>'
    +'</div>'
    +'<div class="tw">'
    +'<div class="th c7"><span>Proyecto / Expediente</span><span>Estado</span><span>Cliente</span><span>Producto</span><span>Presupuesto TAB</span><span>Precio final</span><span></span></div>'
    +(opps.length===0?'<div class="empty"><i class="ti ti-inbox" style="font-size:36px;display:block;margin-bottom:10px"></i>Sin expedientes. Añade la primera oportunidad.</div>'
    :opps.map(o=>'<div class="tr c7" onclick="openSP(\''+o.id+'\')"><div><div style="font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.nombre)+'</div><div style="color:var(--text3);font-size:11px;margin-top:2px">'+esc(o.expediente)+' · '+esc(o.plataforma)+' · '+o.fecha+'</div></div>'
    +'<div>'+badge(o.estado)+'</div>'
    +'<div><span class="chip">'+o.cliente+'</span></div>'
    +'<div><div style="font-size:12px;font-weight:600">'+esc(o.producto)+'</div>'+(o.subdivision==='HV'?'<span class="badge bh" style="margin-top:2px">HV</span>':'')+'</div>'
    +'<div style="font-weight:700;font-size:13px;color:var(--tab)">'+fmt(o.importe)+'</div>'
    +'<div style="font-weight:700;font-size:13px;color:'+(o.estado==='Ganada'?'var(--ok)':o.estado==='Perdida'?'var(--red)':'var(--text3)')+'">'+fmt(o.precio_final)+'</div>'
    +'<div><button class="btn btn-g btn-sm" onclick="event.stopPropagation();openSP(\''+o.id+'\')"><i class="ti ti-eye"></i></button></div></div>').join(''))
    +'</div>';
}

function openSP(id){S.selId=id;renderSP()}
function closeSP(){const el=document.getElementById('spbg');if(el)el.remove()}
function renderSP(){
  closeSP();
  const o=S.opps.find(x=>x.id===S.selId);if(!o)return;
  const div=document.createElement('div');div.className='panel-bg';div.id='spbg';
  div.onclick=e=>{if(e.target===div)closeSP()};
  const maxP=o.competidores.length?Math.max(...o.competidores.map(c=>c.precio)):1;
  div.innerHTML='<div class="panel">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px"><div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">'+badge(o.estado)+(o.subdivision==='HV'?'<span class="badge bh">HV</span>':'')+'<span class="chip">'+esc(o.tipo)+'</span></div>'
    +'<div class="panel-title">'+esc(o.nombre)+'</div>'
    +'<div style="color:var(--text3);font-size:12px;margin-top:4px">'+esc(o.expediente)+' · '+esc(o.plataforma)+' · '+o.fecha+'</div>'
    +'</div><button class="btn btn-g btn-sm" onclick="closeSP()"><i class="ti ti-x"></i></button></div>'

    +'<div class="ps"><div class="pst"><span>Importes</span></div>'
    +'<div class="fg">'
    +'<div class="kv"><span class="kl">Presupuesto TAB</span><span class="biga">'+fmt(o.importe)+'</span><span style="font-size:11px;color:var(--text3)">Nuestro material</span></div>'
    +'<div class="kv"><span class="kl">Precio final cliente</span><span class="biga" style="color:'+(o.estado==='Ganada'?'var(--ok)':o.estado==='Perdida'?'var(--red)':'var(--text3)')+'">'+fmt(o.precio_final)+'</span><span style="font-size:11px;color:var(--text3)">Llave en mano</span></div>'
    +'</div>'
    +(can('edit_price')?'<div style="margin-top:12px;display:flex;gap:7px;align-items:flex-end"><div style="flex:1"><label style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:4px">Actualizar precio final (€)</label><input type="number" id="inp-pf" style="width:100%;background:var(--bg);border:2px solid var(--border2);border-radius:7px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none" value="'+(o.precio_final||'')+'"></div><button class="btn btn-p btn-sm" onclick="savePF(\''+o.id+'\')"><i class="ti ti-check"></i> Guardar</button></div>':'')
    +'</div>'

    +'<div class="ps"><div class="pst"><span>Detalle del expediente</span></div>'
    +'<div class="fg">'
    +'<div class="kv"><span class="kl">Órgano contratante</span><span class="kv-v">'+esc(o.organo||'—')+'</span></div>'
    +'<div class="kv"><span class="kl">Plataforma</span><span class="kv-v">'+esc(o.plataforma)+'</span></div>'
    +'<div class="kv"><span class="kl">Cliente TAB</span><span class="kv-v">'+o.cliente+'</span></div>'
    +'<div class="kv"><span class="kl">Producto</span><span class="kv-v">'+esc(o.producto)+'</span></div>'
    +'<div class="kv"><span class="kl">Subdivisión</span><span class="kv-v">'+o.subdivision+'</span></div>'
    +'<div class="kv"><span class="kl">Aprobado PM</span><span class="kv-v">'+(o.aprobado_pm?'<span style="color:var(--ok);font-weight:700">✓ Sí</span>':'<span style="color:var(--warn);font-weight:700">Pendiente</span>')+'</span></div>'
    +(o.fecha_limite?'<div class="kv"><span class="kl">Fecha límite oferta</span><span class="kv-v" style="color:var(--warn);font-weight:700">'+o.fecha_limite+'</span></div>':'')
    +(o.importe_licitacion?'<div class="kv"><span class="kl">Importe licitación total</span><span class="kv-v">'+fmt(o.importe_licitacion)+'</span></div>':'')
    +'</div>'
    +(o.descripcion?'<div class="kv" style="margin-top:10px"><span class="kl">Descripción</span><p style="font-size:13px;color:var(--text2);line-height:1.6;margin-top:4px">'+esc(o.descripcion)+'</p></div>':'')
    +'<div style="margin-top:12px;display:flex;gap:7px;flex-wrap:wrap">'
    +(can('approve')&&!o.aprobado_pm?'<button class="btn btn-p btn-sm" onclick="aprobar(\''+o.id+'\')"><i class="ti ti-check"></i> Aprobar PM</button>':'')
    +(can('approve')&&o.aprobado_pm&&o.estado==='Revisión PM'?'<button class="btn btn-p btn-sm" onclick="enviarCli(\''+o.id+'\')"><i class="ti ti-send"></i> Enviada a cliente</button>':'')
    +(can('add')&&o.estado==='Detectada'?'<button class="btn btn-g btn-sm" onclick="cambiar(\''+o.id+'\',\'Revisión PM\')"><i class="ti ti-send"></i> Enviar a PM</button>':'')
    +(can('edit_price')&&o.estado==='Enviada cliente'?'<button class="btn btn-ok" onclick="cambiar(\''+o.id+'\',\'Ganada\')"><i class="ti ti-trophy"></i> Ganada</button><button class="btn btn-danger" onclick="cambiar(\''+o.id+'\',\'Perdida\')"><i class="ti ti-x"></i> Perdida</button>':'')
    +'</div></div>'

    +'<div class="ps"><div class="pst"><span>Documentos adjuntos</span>'
    +(can('add')||can('edit_own')?'<label style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--tab)"><i class="ti ti-upload"></i> Subir<input type="file" multiple style="display:none" onchange="addDoc(\''+o.id+'\',this)"></label>':'')
    +'</div>'
    +((o.docs||[]).length===0?'<div style="font-size:12px;color:var(--text3)">Sin documentos adjuntos</div>'
    :o.docs.map((d,i)=>'<div class="doc-item"><i class="ti '+fileIcon(d.name)+'" style="font-size:18px;color:var(--tab);flex-shrink:0"></i><span class="doc-name" onclick="dlDoc(\''+o.id+'\','+i+')">'+esc(d.name)+'</span><span class="doc-size">'+d.size+'</span>'+(can('add')||can('edit_own')?'<i class="ti ti-trash fdel" onclick="rmDoc(\''+o.id+'\','+i+')"></i>':'')+'</div>').join(''))
    +'</div>'

    +'<div class="ps"><div class="pst"><span>Competidores</span>'
    +(can('add_competitor')||can('edit_price')?'<button class="btn btn-g btn-sm" onclick="addComp(\''+o.id+'\')"><i class="ti ti-plus"></i> Añadir</button>':'')
    +'</div>'
    +((o.competidores||[]).length===0?'<div style="font-size:12px;color:var(--text3)">Sin competidores registrados</div>'
    :o.competidores.map(c=>'<div class="comp-row"><div style="flex:1;font-size:12px;font-weight:600">'+esc(c.nombre)+(c.ganador?' <i class="ti ti-trophy" style="color:var(--warn);font-size:12px"></i>':'')+'</div><div style="width:90px"><div class="cbar"><div class="cbar-f" style="width:'+Math.round(c.precio/maxP*100)+'%;background:'+(c.ganador?'var(--ok)':'var(--tab)')+'"></div></div></div><div style="font-weight:700;font-size:12px;min-width:90px;text-align:right;color:'+(c.ganador?'var(--ok)':'var(--text2)')+'">'+fmt(c.precio)+'</div></div>').join(''))
    +'</div>'

    +'<div class="ps"><div class="pst"><span>Historial</span></div>'
    +o.timeline.map((t,i)=>'<div class="tl-item"><div class="tl-w"><div class="tl-dot" style="background:'+(i===o.timeline.length-1?'var(--ok)':'var(--tab)')+'"></div>'+(i<o.timeline.length-1?'<div class="tl-ln"></div>':'')+'</div><div class="tl-c"><div class="tl-date">'+t.fecha+'</div><div class="tl-txt">'+esc(t.txt)+'</div></div></div>').join('')
    +'</div></div>';
  document.body.appendChild(div);
}

function savePF(id){const v=parseFloat(document.getElementById('inp-pf').value);if(isNaN(v)){alert('Introduce un número válido');return;}const o=S.opps.find(x=>x.id===id);o.precio_final=v;push(o,'Precio final: '+fmt(v));closeSP();openSP(id)}
function aprobar(id){const o=S.opps.find(x=>x.id===id);o.aprobado_pm=true;push(o,'PM aprueba');closeSP();openSP(id)}
function enviarCli(id){const o=S.opps.find(x=>x.id===id);o.estado='Enviada cliente';push(o,'Enviada a '+o.cliente);closeSP();openSP(id)}
function cambiar(id,n){const o=S.opps.find(x=>x.id===id);o.estado=n;push(o,'Estado: '+n);closeSP();openSP(id);render()}
function addComp(id){const n=prompt('Nombre del competidor:');if(!n)return;const p=parseFloat(prompt('Precio ofertado (€):'));if(isNaN(p))return;const g=confirm('¿Es el adjudicatario ganador?');const o=S.opps.find(x=>x.id===id);o.competidores.push({nombre:n,precio:p,ganador:g});push(o,'Competidor: '+n+' — '+fmt(p));closeSP();openSP(id)}
function addDoc(id,inp){const o=S.opps.find(x=>x.id===id);Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{o.docs.push({name:f.name,size:fmtSz(f.size),type:f.type,dataUrl:ev.target.result});push(o,'Doc: '+f.name);closeSP();openSP(id);};r.readAsDataURL(f);})}
function rmDoc(id,i){const o=S.opps.find(x=>x.id===id);o.docs.splice(i,1);closeSP();openSP(id)}
function dlDoc(id,i){const o=S.opps.find(x=>x.id===id);const d=o.docs[i];if(!d.dataUrl){alert('No disponible');return;}const a=document.createElement('a');a.href=d.dataUrl;a.download=d.name;a.click()}

function openNewModal(){
  pendingFiles=[];
  document.getElementById('modal-root').innerHTML='<div class="modal-bg" id="nmbg" onclick="if(event.target.id===\'nmbg\')closeNM()">'
    +'<div class="modal"><div class="modal-title"><i class="ti ti-plus-circle" style="color:var(--tab)"></i> Nueva oportunidad</div>'
    +'<div class="fg2">'
    +'<div class="ff full"><label>Nombre del proyecto *</label><input id="nf-n" placeholder="Nombre completo del objeto del contrato"></div>'
    +'<div class="ff"><label>Nº Expediente *</label><input id="nf-e" placeholder="EXP-2025-XXXX"></div>'
    +'<div class="ff"><label>Plataforma</label><select id="nf-pl"><option>PLACE</option><option>contractaciopublica.cat</option><option>Privado</option><option>Otro</option></select></div>'
    +'<div class="ff"><label>Tipo</label><select id="nf-t"><option>Público</option><option>Privado</option></select></div>'
    +'<div class="ff"><label>Fecha detección</label><input type="date" id="nf-f" value="'+new Date().toISOString().slice(0,10)+'"></div>'
    +'<div class="ff"><label>Órgano contratante</label><input id="nf-o" placeholder="Ayuntamiento, empresa…"></div>'
    +'<div class="ff"><label>Cliente TAB *</label><select id="nf-c">'+CLIENTES.map(c=>'<option>'+c+'</option>').join('')+'</select></div>'
    +'<div class="ff"><label>Producto TAB *</label><select id="nf-p">'+PRODUCTOS.map(p=>'<option>'+p+'</option>').join('')+'</select></div>'
    +'<div class="ff"><label>Subdivisión</label><select id="nf-s"><option>Básico</option><option>HV</option></select></div>'
    +'<div class="ff"><label>Presupuesto material TAB (€)</label><input type="number" id="nf-i" step="0.01" placeholder="0.00"></div>'
    +'<div class="ff"><label>Importe total licitación (€)</label><input type="number" id="nf-il" step="0.01" placeholder="Opcional"></div>'
    +'<div class="ff"><label>Fecha límite oferta</label><input type="date" id="nf-fl"></div>'
    +'<div class="ff full"><label>Descripción / notas internas</label><textarea id="nf-d" placeholder="Objeto del contrato, requerimientos técnicos…"></textarea></div>'
    +'<div class="ff full"><label>Documentos adjuntos</label>'
    +'<div class="file-drop" id="fdz" onclick="document.getElementById(\'fi\').click()" ondragover="event.preventDefault();this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="hDrop(event)">'
    +'<i class="ti ti-cloud-upload"></i><p><strong>Haz clic o arrastra archivos aquí</strong></p><p style="margin-top:3px;font-size:11px">PDF, Word, Excel, imágenes</p>'
    +'<input type="file" id="fi" multiple style="display:none" onchange="hFI(this)"></div>'
    +'<div class="file-list" id="fl"></div></div>'
    +'</div>'
    +'<div class="form-actions"><button class="btn btn-g" onclick="closeNM()">Cancelar</button><button class="btn btn-p" onclick="saveNew()"><i class="ti ti-check"></i> Crear expediente</button></div>'
    +'</div></div>';
}
function closeNM(){document.getElementById('modal-root').innerHTML='';pendingFiles=[]}
function hFI(inp){Array.from(inp.files).forEach(addPF);inp.value=''}
function hDrop(e){e.preventDefault();document.getElementById('fdz').classList.remove('over');Array.from(e.dataTransfer.files).forEach(addPF)}
function addPF(f){const r=new FileReader();r.onload=ev=>{pendingFiles.push({name:f.name,size:fmtSz(f.size),type:f.type,dataUrl:ev.target.result});renderFP();};r.readAsDataURL(f)}
function rmPF(i){pendingFiles.splice(i,1);renderFP()}
function renderFP(){const el=document.getElementById('fl');if(!el)return;el.innerHTML=pendingFiles.map((f,i)=>'<div class="file-item"><i class="ti '+fileIcon(f.name)+'" style="font-size:18px;color:var(--tab);flex-shrink:0"></i><span class="fname">'+esc(f.name)+'</span><span class="fsize">'+f.size+'</span><i class="ti ti-x fdel" onclick="rmPF('+i+')"></i></div>').join('')}
function saveNew(){
  const n=(document.getElementById('nf-n').value||'').trim();
  const e=(document.getElementById('nf-e').value||'').trim();
  if(!n){alert('El nombre es obligatorio.');document.getElementById('nf-n').focus();return;}
  if(!e){alert('El expediente es obligatorio.');document.getElementById('nf-e').focus();return;}
  const id='LIT-'+(String(S.opps.length+1).padStart(3,'0'));
  S.opps.unshift({id,nombre:n,expediente:e,
    plataforma:document.getElementById('nf-pl').value,tipo:document.getElementById('nf-t').value,
    fecha:document.getElementById('nf-f').value,organo:(document.getElementById('nf-o').value||'').trim(),
    cliente:document.getElementById('nf-c').value,estado:'Detectada',
    producto:document.getElementById('nf-p').value,subdivision:document.getElementById('nf-s').value,
    importe:parseFloat(document.getElementById('nf-i').value)||null,
    importe_licitacion:parseFloat(document.getElementById('nf-il').value)||null,
    fecha_limite:document.getElementById('nf-fl').value||null,
    precio_final:null,aprobado_pm:false,descripcion:(document.getElementById('nf-d').value||'').trim(),
    docs:[...pendingFiles],competidores:[],
    timeline:[{fecha:new Date().toISOString().slice(0,10),txt:'Creado por '+ROLES[S.user].label}]
  });
  closeNM();render();setTimeout(()=>openSP(id),80);
}

function renderDash(main){
  const opps=S.opps;
  const ganadas=opps.filter(o=>o.estado==='Ganada');
  const cerradas=opps.filter(o=>['Ganada','Perdida'].includes(o.estado));
  const tasa=cerradas.length?Math.round(ganadas.length/cerradas.length*100):0;
  const volG=ganadas.reduce((a,b)=>a+(b.precio_final||0),0);
  const byProd={};opps.forEach(o=>{byProd[o.producto]=(byProd[o.producto]||0)+1});
  const byCli={AZIMUT:opps.filter(o=>o.cliente==='AZIMUT').length,RICARD:opps.filter(o=>o.cliente==='RICARD').length};
  main.innerHTML='<div class="sec-title"><i class="ti ti-chart-bar" style="color:var(--tab)"></i> Dashboard global</div>'
    +'<div class="stats">'
    +'<div class="stat"><div class="sv c-tab">'+opps.length+'</div><div class="sl">Total</div></div>'
    +'<div class="stat"><div class="sv c-ok">'+tasa+'%</div><div class="sl">Tasa éxito</div></div>'
    +'<div class="stat"><div class="sv c-tab" style="font-size:15px">'+fmt(volG)+'</div><div class="sl">Volumen ganado</div></div>'
    +'<div class="stat"><div class="sv c-w">'+opps.filter(o=>o.estado==='Revisión PM').length+'</div><div class="sl">Pendientes PM</div></div>'
    +'</div>'
    +'<div class="dash-grid">'
    +'<div class="tw" style="padding:16px"><div class="pst" style="margin-bottom:12px"><span>Pipeline por estado</span></div>'
    +ESTADOS.map(e=>{const c=opps.filter(o=>o.estado===e).length;const p=opps.length?Math.round(c/opps.length*100):0;return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+badge(e)+'<div class="cbar" style="flex:1"><div class="cbar-f" style="width:'+p+'%;background:var(--tab)"></div></div><span style="font-weight:800;font-size:13px;min-width:16px">'+c+'</span></div>';}).join('')
    +'</div>'
    +'<div class="tw" style="padding:16px"><div class="pst" style="margin-bottom:12px"><span>Por cliente</span></div>'
    +Object.entries(byCli).map(([k,v])=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="chip" style="min-width:70px;justify-content:center">'+k+'</span><div class="cbar" style="flex:1"><div class="cbar-f" style="width:'+(opps.length?Math.round(v/opps.length*100):0)+'%;background:'+(k==='AZIMUT'?'var(--tab)':'var(--ok)')+'"></div></div><span style="font-weight:800;font-size:13px">'+v+'</span></div>').join('')
    +'<div class="pst" style="margin-top:14px;margin-bottom:10px"><span>Por producto</span></div>'
    +Object.entries(byProd).map(([k,v])=>'<div style="display:flex;gap:6px;margin-bottom:7px;align-items:center"><span style="flex:1;font-size:12px;font-weight:600;color:var(--text2)">'+k+'</span><span style="font-weight:800">'+v+'</span></div>').join('')
    +'</div></div>';
}

function renderExport(main){
  main.innerHTML='<div class="sec-title"><i class="ti ti-download" style="color:var(--tab)"></i> Exportar datos</div>'
    +'<div class="tw" style="max-width:460px;padding:20px">'
    +'<div class="pst" style="margin-bottom:12px"><span>Opciones de exportación</span></div>'
    +'<div class="exp-row"><i class="ti ti-file-spreadsheet" style="color:var(--ok);font-size:18px"></i><span>Todas las oportunidades (CSV)</span><button class="btn btn-p btn-sm" onclick="expCSV(\'all\')">Exportar</button></div>'
    +'<div class="exp-row"><i class="ti ti-trophy" style="color:var(--warn);font-size:18px"></i><span>Solo ganadas</span><button class="btn btn-g btn-sm" onclick="expCSV(\'ganadas\')">Exportar</button></div>'
    +'<div class="exp-row"><i class="ti ti-users" style="color:var(--info);font-size:18px"></i><span>Por cliente</span><select id="exp-c" style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:var(--text);font-family:var(--font);font-size:12px;margin-right:6px"><option>AZIMUT</option><option>RICARD</option></select><button class="btn btn-g btn-sm" onclick="expCSV(\'cliente\')">Exportar</button></div>'
    +'<div class="exp-row"><i class="ti ti-database" style="color:var(--tab);font-size:18px"></i><span>Backup completo (JSON)</span><button class="btn btn-g btn-sm" onclick="expJSON()">Exportar JSON</button></div>'
    +'</div>';
}
function expCSV(f){let opps=S.opps;if(f==='ganadas')opps=opps.filter(o=>o.estado==='Ganada');if(f==='cliente'){const c=document.getElementById('exp-c').value;opps=opps.filter(o=>o.cliente===c);}const h=['ID','Nombre','Expediente','Plataforma','Tipo','Fecha','Órgano','Cliente','Estado','Producto','Subdivisión','Presupuesto TAB','Importe Licitación','Precio Final','Aprobado PM','Nº Docs'];const rows=opps.map(o=>[o.id,'"'+o.nombre+'"',o.expediente,o.plataforma,o.tipo,o.fecha,'"'+(o.organo||'')+'"',o.cliente,o.estado,o.producto,o.subdivision,o.importe||'',o.importe_licitacion||'',o.precio_final||'',o.aprobado_pm?'Sí':'No',(o.docs||[]).length]);const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download='tabspain_'+f+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}
function expJSON(){const exp=S.opps.map(o=>({...o,docs:(o.docs||[]).map(d=>({name:d.name,size:d.size}))}));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(exp,null,2)],{type:'application/json'}));a.download='tabspain_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click()}

function renderAcceso(main){
  main.innerHTML='<div class="sec-title"><i class="ti ti-brand-github" style="color:var(--tab)"></i> Publicar en GitHub Pages</div>'
    +'<div class="info-box"><div class="info-box-title"><i class="ti ti-brand-github"></i> Pasos para publicar</div>'
    +'<ol>'
    +'<li>Descarga el archivo con el botón de abajo → renómbralo <code>index.html</code> si es necesario</li>'
    +'<li>Ve a <a href="https://github.com/new" target="_blank" style="color:var(--tab);font-weight:700">github.com/new</a> y crea un repositorio llamado <code>tab-litio-tracker</code> (Public)</li>'
    +'<li>Dentro del repo: <strong>Add file → Upload files</strong> → arrastra el <code>index.html</code> → <strong>Commit changes</strong></li>'
    +'<li>Ve a <strong>Settings → Pages → Branch: main → / (root) → Save</strong></li>'
    +'<li>En ~1 min tu app estará en: <code>https://robertonavarroruiz-dotcom.github.io/tab-litio-tracker</code></li>'
    +'</ol></div>'
    +'<div class="info-box green"><div class="info-box-title"><i class="ti ti-info-circle"></i> Aviso sobre los datos</div>'
    +'<ol><li>Los datos se guardan en el navegador de cada usuario (sesión local)</li>'
    +'<li>Para compartir datos entre usuarios, usa la pestaña Exportar → JSON y comparte el archivo</li>'
    +'<li>Para base de datos compartida en tiempo real podemos conectar Supabase (gratis)</li></ol></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<button class="btn btn-p" onclick="dlHTML()"><i class="ti ti-download"></i> Descargar index.html</button>'
    +'<a href="https://github.com/new" target="_blank" class="btn btn-g"><i class="ti ti-brand-github"></i> Crear repositorio</a></div>';
}
function dlHTML(){const h=document.documentElement.outerHTML;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['<!DOCTYPE html>'+h],{type:'text/html;charset=utf-8'}));a.download='index.html';a.click()}

render();
</script>
