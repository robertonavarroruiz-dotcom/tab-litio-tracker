<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAB Spain · Tracker Litio HV</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tab:#00579C;--tab2:#003B7A;--tab-l:#E8F0FB;
  --bg:#F4F6FA;--bg3:#EEF1F6;
  --red:#ED1C24;--ok:#1a7a45;--warn:#B45309;--info:#1D4ED8;
  --text:#1A202C;--text2:#4A5568;--text3:#718096;
  --border:#DDE3EC;--border2:#C5CEDC;
  --font:'Segoe UI',system-ui,sans-serif;
  --sh:0 1px 3px rgba(0,0,0,0.07);--sh2:0 6px 24px rgba(0,0,0,0.13);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
.topbar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:62px;box-shadow:var(--sh);position:sticky;top:0;z-index:50}
.vd{width:1px;height:32px;background:var(--border2)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.ntab{padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent;transition:all .12s;display:flex;align-items:center;gap:5px}
.ntab:hover{background:var(--bg3)}
.ntab.active{color:var(--tab);background:var(--tab-l);border-color:#BDD0EC}
.upill{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);padding:5px 13px;border-radius:20px;cursor:pointer;margin-left:auto;white-space:nowrap;font-size:12px;font-weight:600;color:var(--text2)}
.udot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0}
.main{padding:22px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:85vh}
.login-box{background:#fff;border:1px solid var(--border);border-radius:14px;padding:40px;width:380px;box-shadow:var(--sh2);text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;transition:all .12s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--tab);color:#fff;padding:10px 20px;font-size:13px}
.btn-p:hover{background:var(--tab2)}
.btn-g{background:transparent;color:var(--text2);border:2px solid var(--border2);padding:7px 14px;font-size:12px}
.btn-g:hover{background:var(--bg3)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;padding:11px}
.btn-ok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;padding:6px 12px;font-size:12px}
.btn-danger{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;padding:6px 12px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--sh)}
.sv{font-size:22px;font-weight:800}.sl{font-size:11px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.c-tab{color:var(--tab)}.c-ok{color:var(--ok)}.c-w{color:var(--warn)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:#fff;border:2px solid var(--border2);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--tab)}
.toolbar input{min-width:200px}
.tw{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.th{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:grid;gap:8px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.tr{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;gap:8px;align-items:center;cursor:pointer;transition:background .1s}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--tab-l)}
.c7{grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 64px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bd{background:#EDE9FE;color:#5B21B6;border:1px solid #C4B5FD}
.br{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.be{background:#DBEAFE;color:#1D4ED8;border:1px solid #93C5FD}
.bg{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.bl{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5}
.bh{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;font-size:10px;padding:2px 6px}
.chip{display:inline-flex;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.panel-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;justify-content:flex-end}
.panel{background:#fff;width:580px;max-width:96vw;height:100vh;overflow-y:auto;border-left:1px solid var(--border);padding:26px;display:flex;flex-direction:column;gap:16px;box-shadow:-4px 0 20px rgba(0,0,0,0.09)}
.panel-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.ps{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.pst{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kv{display:flex;flex-direction:column;gap:2px}
.kl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.kv-v{font-size:13px;font-weight:600;color:var(--text)}
.biga{font-size:20px;font-weight:800;color:var(--tab)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:700px;max-width:100%;box-shadow:var(--sh2);margin:auto}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;color:var(--text);display:flex;align-items:center;gap:7px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.ff label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{background:var(--bg);border:2px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--tab);background:#fff;box-shadow:0 0 0 3px rgba(0,87,156,0.07)}
.ff textarea{resize:vertical;min-height:70px;line-height:1.5}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.file-drop{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.file-drop:hover,.file-drop.over{border-color:var(--tab);background:var(--tab-l)}
.file-drop i{font-size:30px;color:var(--text3);display:block;margin-bottom:8px}
.file-drop p{font-size:12px;color:var(--text3)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:7px;padding:8px 12px}
.fname{flex:1;font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-size:11px;color:var(--text3);white-space:nowrap}
.fdel{cursor:pointer;color:var(--red);font-size:14px;flex-shrink:0}
.tl-item{display:flex;gap:10px}
.tl-w{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-ln{width:1px;background:var(--border2);flex:1;min-height:16px}
.tl-c{padding-bottom:12px;flex:1}
.tl-date{font-size:11px;color:var(--text3);font-weight:500}
.tl-txt{font-size:12px;color:var(--text2);margin-top:1px}
.comp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.cbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;flex:1}
.cbar-f{height:100%;border-radius:2px}
.doc-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.doc-item:last-child{border-bottom:none}
.doc-name{flex:1;font-size:12px;font-weight:600;color:var(--tab);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-size{font-size:11px;color:var(--text3);white-space:nowrap}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.sec-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.exp-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.exp-row:last-child{border-bottom:none}
.exp-row span{color:var(--text2);flex:1;font-weight:500}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

// ── SUPABASE API ──
async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){const t=await res.text();console.error('SB error:',t);return null;}
  const ct=res.headers.get('content-type')||'';
  if(ct.includes('application/json')&&res.status!==204) return res.json();
  return true;
}

async function loadOpps(){
  S.syncing=true;renderSyncBar();
  const rows=await sbFetch('/rest/v1/oportunidades?select=*&order=updated_at.desc');
  if(rows) S.opps=rows.map(r=>r.data);
  S.syncing=false;renderSyncBar();
}

async function saveOpp(o){
  S.syncing=true;renderSyncBar();
  o.updated_at=new Date().toISOString();
  await sbFetch('/rest/v1/oportunidades',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify({id:o.id,data:o})
  });
  S.syncing=false;renderSyncBar();
}

async function uploadDoc(oppId,file){
  const ext=file.name.split('.').pop();
  const path=oppId+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const res=await fetch(SB_URL+'/storage/v1/object/documentos/'+path,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type||'application/octet-stream'},
    body:file
  });
  if(!res.ok){alert('Error subiendo archivo: '+file.name);return null;}
  const publicUrl=SB_URL+'/storage/v1/object/public/documentos/'+path;
  return {name:file.name,size:fmtSz(file.size),type:file.type,url:publicUrl,path};
}

function renderSyncBar(){
  const el=document.getElementById('sync-bar');
  if(!el)return;
  el.innerHTML=S.syncing
    ?'<div class="sync-dot syncing"></div><span>Sincronizando...</span>'
    :'<div class="sync-dot"></div><span>Sincronizado con Supabase · datos compartidos</span>';
}

function can(p){return S.user&&ROLES[S.user].perms.includes(p)}
function fmt(n){if(!n&&n!==0)return'—';return'€'+Number(n).toLocaleString('es-ES')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function badge(e){const m={'Detectada':'bd','Revisión PM':'br','Enviada cliente':'be','Ganada':'bg','Perdida':'bl'};return'<span class="badge '+(m[e]||'')+'">' +esc(e)+'</span>'}
function fileIcon(n){const e=(n||'').split('.').pop().toLowerCase();return{pdf:'ti-file-type-pdf',doc:'ti-file-type-doc',docx:'ti-file-type-doc',xls:'ti-file-type-xls',xlsx:'ti-file-type-xls',png:'ti-photo',jpg:'ti-photo',jpeg:'ti-photo'}[e]||'ti-file'}
function fmtSz(b){if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return(b/1048576).toFixed(1)+' MB'}
function push(o,txt){o.timeline.push({fecha:new Date().toISOString().slice(0,10),txt})}

async function render(){
  if(!S.user){renderLogin();return;}
  renderNav();
  document.getElementById('user-label').textContent=ROLES[S.user].label;
  const m=document.getElementById('main');
  if(S.tab==='opps')renderOpps(m);
  else if(S.tab==='dash')renderDash(m);
  else if(S.tab==='export')renderExport(m);
}

  render();
}
function logout(){S.user=null;S.opps=[];render()}

async function savePF(id){
  const v=parseFloat(document.getElementById('inp-pf').value);if(isNaN(v)){alert('Número inválido');return;}
  const o=S.opps.find(x=>x.id===id);o.precio_final=v;push(o,'Precio final: '+fmt(v));
  await saveOpp(o);closeSP();openSP(id);
}
async function aprobar(id){
  const o=S.opps.find(x=>x.id===id);o.aprobado_pm=true;push(o,'PM aprueba viabilidad técnica');
  await saveOpp(o);closeSP();openSP(id);
}
async function enviarCli(id){
  const o=S.opps.find(x=>x.id===id);o.estado='Enviada cliente';push(o,'Enviada a '+o.cliente);
  await saveOpp(o);closeSP();openSP(id);
}
async function cambiar(id,n){
  const o=S.opps.find(x=>x.id===id);o.estado=n;push(o,'Estado: '+n);
  await saveOpp(o);closeSP();openSP(id);render();
}
async function addComp(id){
  const n=prompt('Nombre del competidor:');if(!n)return;
  const p=parseFloat(prompt('Precio ofertado (€):'));if(isNaN(p))return;
  const g=confirm('¿Es el adjudicatario ganador?');
  const o=S.opps.find(x=>x.id===id);
  if(!o.competidores)o.competidores=[];
  o.competidores.push({nombre:n,precio:p,ganador:g});
  push(o,'Competidor: '+n+' — '+fmt(p));
  await saveOpp(o);closeSP();openSP(id);
}
async function addDoc(id,inp){
  const o=S.opps.find(x=>x.id===id);
  if(!o.docs)o.docs=[];
  for(const f of Array.from(inp.files)){
    const doc=await uploadDoc(id,f);
    if(doc){o.docs.push(doc);push(o,'Documento: '+f.name);}
  }
  await saveOpp(o);closeSP();openSP(id);
}
async function rmDoc(id,i){
  const o=S.opps.find(x=>x.id===id);o.docs.splice(i,1);
  await saveOpp(o);closeSP();openSP(id);
}

  const e=(document.getElementById('nf-e').value||'').trim();
  if(!n){alert('El nombre es obligatorio.');return;}
  if(!e){alert('El expediente es obligatorio.');return;}
  document.getElementById('btn-save').disabled=true;

    fecha:document.getElementById('nf-f').value,organo:(document.getElementById('nf-o').value||'').trim(),
    cliente:document.getElementById('nf-c').value,estado:'Detectada',
    producto:document.getElementById('nf-p').value,subdivision:document.getElementById('nf-s').value,

    importe_licitacion:parseFloat(document.getElementById('nf-il').value)||null,
    fecha_limite:document.getElementById('nf-fl').value||null,
    precio_final:null,aprobado_pm:false,descripcion:(document.getElementById('nf-d').value||'').trim(),
    docs:[],competidores:[],
    timeline:[{fecha:new Date().toISOString().slice(0,10),txt:'Creado por '+ROLES[S.user].label}]

function expCSV(f){
  let opps=S.opps;
  if(f==='ganadas')opps=opps.filter(o=>o.estado==='Ganada');
  if(f==='cliente'){const c=document.getElementById('exp-c').value;opps=opps.filter(o=>o.cliente===c);}
  const h=['ID','Nombre','Expediente','Plataforma','Tipo','Fecha','Órgano','Cliente','Estado','Producto','Subdivisión','Presupuesto TAB','Importe Licitación','Precio Final','Aprobado PM','Nº Docs'];
  const rows=opps.map(o=>[o.id,'"'+o.nombre+'"',o.expediente,o.plataforma,o.tipo,o.fecha,'"'+(o.organo||'')+'"',o.cliente,o.estado,o.producto,o.subdivision,o.importe||'',o.importe_licitacion||'',o.precio_final||'',o.aprobado_pm?'Sí':'No',(o.docs||[]).length]);
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download='tabspain_'+f+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function expJSON(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S.opps,null,2)],{type:'application/json'}));a.download='tabspain_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

render();
</script>
